<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Wan Video Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .view-container { display: none; height: 100%; width: 100%; }
        .view-container.active { display: flex; }
        webview { width: 100%; height: 100%; border: none; }
        .btn-active { background-color: #2563eb; color: white; }
        /* Hiệu ứng ẩn/hiện sidebar */
        .sidebar-wrapper { transition: all 0.3s ease; }
        .sidebar-hidden { margin-left: -16rem; }
    </style>
</head>
<body class="bg-gray-900 h-screen p-2 flex">

    <!-- Khung viền giao diện chính -->
    <div class="flex-1 flex overflow-hidden border-4 border-gray-700 rounded-2xl bg-gray-950 shadow-2xl">
        
        <!-- Sidebar -->
        <aside id="sidebar-wrapper" class="sidebar-wrapper w-64 bg-gray-800 border-r border-gray-700 flex flex-col z-10">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <h1 class="text-lg font-bold text-white">Wan.video</h1>
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white">✕</button>
            </div>
            <div id="sidebar" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 bg-white relative flex flex-col">
            <!-- Header bar -->
            <div class="h-12 bg-gray-800 flex items-center px-4">
                <button onclick="toggleSidebar()" class="text-white bg-gray-700 px-3 py-1 rounded hover:bg-gray-600">≡ Menu</button>
            </div>
            <div id="main-content" class="flex-1"></div>
        </main>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const sidebarWrapper = document.getElementById('sidebar-wrapper');

        // Hàm ẩn hiện sidebar
        function toggleSidebar() {
            sidebarWrapper.classList.toggle('sidebar-hidden');
        }

        // Tạo 10 tài khoản
        for (let i = 1; i <= 10; i++) {
            const btn = document.createElement('button');
            btn.className = "w-full text-left px-4 py-3 rounded-lg hover:bg-blue-600 transition text-gray-300 hover:text-white";
            btn.innerText = `Tài khoản ${i}`;
            btn.onclick = () => showView(i);
            btn.id = `btn-${i}`;
            sidebar.appendChild(btn);

            const div = document.createElement('div');
            div.id = `view-${i}`;
            div.className = "view-container";
            div.innerHTML = `<webview src="https://wan.video" partition="persist:acc${i}"></webview>`;
            mainContent.appendChild(div);
        }

        function showView(index) {
            document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('button').forEach(b => b.classList.remove('btn-active'));
            
            document.getElementById(`view-${index}`).classList.add('active');
            document.getElementById(`btn-${index}`).classList.add('btn-active');
        }

        showView(1);
    </script>
</body>
</html>
